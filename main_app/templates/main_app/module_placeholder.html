{% extends 'main_app/base.html' %}
{% load static %}
{% block page_title %}{{ page_title }}{% endblock page_title %}

{% block content %}
<section class="content">
    <div class="container-fluid">
        <div class="row">
            <div class="col-12">
                <div class="card card-dark">
                    <div class="card-header">
                        <h3 class="card-title">{{ page_title }}</h3>
                    </div>
                    <div class="card-body">
                        <p class="mb-4">{{ message }}</p>
                        {% if links %}
                            <div class="row g-3">
                                {% for link in links %}
                                    <div class="col-md-6 col-lg-4">
                                        <a href="{{ link.url }}" class="btn btn-outline-primary w-100 h-100 d-flex align-items-center justify-content-center text-center py-3">
                                            {{ link.label }}
                                        </a>
                                    </div>
                                {% endfor %}
                            </div>
                        {% endif %}
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock content %}
