{% extends 'main_app/base.html' %}
{% block page_title %}{{ page_title }}{% endblock %}
{% block breadcrumb %}<li class="breadcrumb-item active">{{ page_title }}</li>{% endblock %}
{% block content %}
<div class="card shadow-sm border-0">
    <div class="card-header bg-white"><h5 class="mb-0">{{ page_title }}</h5></div>
    <div class="card-body">
        <form method="post" class="row g-3" data-testid="opt-holiday-form">
            {% csrf_token %}
            <div class="col-md-6"><label class="form-label">Holiday Name</label><input class="form-control" name="holiday_name" required></div>
            <div class="col-md-3"><label class="form-label">Date</label><input type="date" class="form-control" name="holiday_date" required></div>
            <div class="col-12"><label class="form-label">Reason</label><textarea class="form-control" name="reason" rows="2"></textarea></div>
            <div class="col-12"><button class="btn btn-primary" type="submit" data-testid="btn-submit-opt-holiday">Submit Request</button></div>
        </form>
    </div>
</div>
{% endblock %}
